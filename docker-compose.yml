version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: chatbot-db

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: